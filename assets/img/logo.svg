<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" role="img" aria-label="Puettage Helferplan Logo (Platzhalter)">
  <!-- Platzhalter-Logo bis das Vereinslogo geliefert wird.
       Weisser Kreis mit rotem Ring und Buchstaben "P" (Puettage). -->
